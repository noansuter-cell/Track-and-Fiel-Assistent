name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /Track-and-Fiel-Assistent
      # _next/ starts with an underscore — without .nojekyll, Jekyll drops it.
      - run: touch out/.nojekyll
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
      # Auto-enablement may have pointed Pages at main (renders the README);
      # force the source to the gh-pages branch.
      - name: Point Pages source at gh-pages branch
        run: |
          status=$(curl -sS -o /tmp/pages-resp.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "PUT /pages -> $status"
          cat /tmp/pages-resp.json
          if [ "$status" -ge 400 ]; then
            echo "::warning::Could not switch Pages source automatically. Set it manually: Settings -> Pages -> Branch: gh-pages"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
